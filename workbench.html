<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Loupe</title>
    <style>
      /* --- IIIF fonts --- */
      @font-face {
        font-family: "Playfair Display";
        font-weight: 700;
        font-display: swap;
        src: url("/fonts/playfair-display-v40-latin-700.woff2") format("woff2");
      }
      @font-face {
        font-family: "Playfair Display";
        font-weight: 500;
        font-display: swap;
        src: url("/fonts/playfair-display-v40-latin-500.woff2") format("woff2");
      }
      @font-face {
        font-family: "PT Sans";
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/pt-sans-v18-latin-regular.woff2") format("woff2");
      }
      @font-face {
        font-family: "PT Sans";
        font-weight: 700;
        font-display: swap;
        src: url("/fonts/pt-sans-v18-latin-700.woff2") format("woff2");
      }
      @font-face {
        font-family: "Courier Prime";
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/courier-prime-v11-latin-regular.woff2") format("woff2");
      }

      /* --- IIIF brand palette --- */
      :root {
        --iiif-blue: #0073b0;
        --iiif-blue-dark: #006297;
        --iiif-ink: #171717;
        --iiif-gray: #363636;
        --iiif-bg: #f5f5f5;
        --iiif-red: #a40832;
        --iiif-tint: #ebf8ff;
      }

      body {
        margin: 0;
        font-family: "PT Sans", sans-serif;
        color: var(--iiif-ink);
        background: #fff;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 16px 24px;
        border-bottom: 1px solid #ddd;
      }
      header h1 {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--iiif-blue);
      }
      header span {
        font-size: 13px;
        color: var(--iiif-gray);
      }
      main {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      main p {
        margin: 0;
        font-size: 16px;
      }
      main ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.6;
      }
      main li {
        font-size: 16px;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        font-family: "Courier Prime", monospace;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .url-row {
        display: flex;
        gap: 8px;
      }
      .url-row input {
        flex: 1;
        padding: 8px 10px;
        font-size: 14px;
        font-family: "PT Sans", sans-serif;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .file-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-family: "Playfair Display", serif;
        font-weight: 500;
      }
      button {
        padding: 8px 16px;
        font-size: 15px;
        font-family: "Playfair Display", serif;
        font-weight: 500;
        border: 0;
        border-radius: 4px;
        background: var(--iiif-blue);
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: var(--iiif-blue-dark);
      }
      .finding {
        margin: 8px 0;
        padding: 10px 12px;
        border-radius: 4px;
        font-family: "Courier Prime", monospace;
        font-size: 13px;
      }
      .finding.error {
        background: #fdecef;
        color: var(--iiif-red);
      }
      .finding.ok {
        background: var(--iiif-tint);
        color: var(--iiif-blue-dark);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Loupe</h1>
      <span>IIIF Presentation Manifest Checker & Validator</span>
    </header>
    <main>
      <p>Provide a IIIF Manifest:</p>
      <ul>
        <li>Enter a manifest URL and click <strong>Load</strong>, or</li>
        <li>Paste the manifest JSON directly into the box below.</li>
      </ul>
      <p>Then click <strong>Validate</strong> to check it.</p>
      <div class="url-row">
        <input id="url" type="url" placeholder="https://.../manifest URL" />
        <button id="load">Load</button>
      </div>
      <div class="file-row">
        <label for="file">Or choose a local file:</label>
        <input id="file" type="file" accept=".json,application/json" />
      </div>
      <textarea
        id="input"
        rows="16"
        placeholder="Paste manifest JSON here..."
      ></textarea>
      <div class="actions">
        <button id="validate">Validate</button>
      </div>
      <div id="report"></div>
    </main>
    <script type="module" src="workbench.js"></script>
  </body>
</html>
