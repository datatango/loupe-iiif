 <!doctype html>
  <html>
    <head>
      <meta charset="utf-8" />
      <title>Loupe</title>
      <style>
        :root { color-scheme: light dark; }
        body { margin: 0; font-family: system-ui, sans-serif; }
        header { display: flex; align-items: baseline; gap: 10px;
                 padding: 16px 24px; border-bottom: 1px solid #8883; }
        header h1 { margin: 0; font-size: 18px; }
        header span { font-size: 13px; color: #888; }
        main { padding: 24px; }
        
        textarea { width: 100%; box-sizing: border-box; padding: 10px;
                    font-family: ui-monospace, monospace; font-size: 13px;
                    border: 1px solid #8884; border-radius: 6px; }
        .actions { margin: 12px 0; }
        button { padding: 8px 16px; font-size: 14px; border: 0; border-radius: 6px;
                 background: #2563eb; color: #fff; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .finding { margin: 8px 0; padding: 10px 12px; border-radius: 6px;
                   font-family: ui-monospace, monospace; font-size: 13px; }
        .finding.error { background: #fee2e2; color: #991b1b; }
        .finding.ok    { background: #dcfce7; color: #166534; }
      </style>
    </head>
    <body>
      <header>
        <h1>Loupe</h1>
        <span>IIIF Manifest Validator</span>
      </header>
      <main>
        <p>Paste an IIIF manifest below and validate it.</p>
        <textarea id="input" rows="16" placeholder="Paste manifest JSON here..."></textarea>
        <div class="actions">
          <button id="validate">Validate</button>
        </div>
        <div id="report"></div>
      </main>
      <script src="workbench.js"></script>
    </body>
  </html>
